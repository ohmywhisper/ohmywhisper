name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            cc: gcc
            cxx: g++
            extra_ldflags: -lgomp
          - arch: arm64
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            cross_packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            cmake_system_processor: aarch64
          - arch: arm32
            goarch: arm
            goarm: "7"
            cc: arm-linux-gnueabihf-gcc
            cxx: arm-linux-gnueabihf-g++
            cross_packages: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            cmake_system_processor: armv7l

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ${{ matrix.cross_packages }}

      - name: Build whisper.cpp libs
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CMAKE_SYSTEM_PROCESSOR: ${{ matrix.cmake_system_processor }}
        run: ./patch.sh

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CC: ${{ matrix.cc }}
        run: |
          LIBDIR="$GITHUB_WORKSPACE/lib"
          go build \
            -ldflags "-extldflags '-L${LIBDIR} -Wl,--start-group -lwhisper -lggml -lggml-cpu -lggml-base -Wl,--end-group -lstdc++ ${{ matrix.extra_ldflags }} -lm -lpthread'" \
            -o bin/ohmywhisper ./cmd/

      - name: Package
        run: zip ohmywhisper_linux_${{ matrix.arch }}.zip bin/ohmywhisper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohmywhisper_linux_${{ matrix.arch }}
          path: ohmywhisper_linux_${{ matrix.arch }}.zip
