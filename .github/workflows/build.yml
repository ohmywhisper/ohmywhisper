name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            cc: gcc
            cxx: g++
            extra_ldflags: -lgomp
          - arch: arm64
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            cross_packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            cmake_system_processor: aarch64
          - arch: arm32
            goarch: arm
            goarm: "7"
            cc: arm-linux-gnueabihf-gcc
            cxx: arm-linux-gnueabihf-g++
            cross_packages: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            cmake_system_processor: armv7l

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ${{ matrix.cross_packages }}

      - name: Build whisper.cpp libs
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CMAKE_SYSTEM_PROCESSOR: ${{ matrix.cmake_system_processor }}
        run: ./patch.sh

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          LIBDIR="$GITHUB_WORKSPACE/lib"
          CC_REAL="${{ matrix.cc }}"
          EXTRA="${{ matrix.extra_ldflags }}"

          {
            echo '#!/bin/bash'
            echo "LINK_FLAGS=\"-L${LIBDIR} -Wl,--start-group -lwhisper -lggml -lggml-cpu -lggml-base -Wl,--end-group -lstdc++ ${EXTRA} -lm -lpthread\""
            echo 'IS_LINK=1'
            echo 'for a in "$@"; do [ "$a" = "-c" ] && IS_LINK=0; done'
            echo "if [ \$IS_LINK -eq 1 ]; then"
            echo "  exec ${CC_REAL} \"\$@\" \$LINK_FLAGS"
            echo "else"
            echo "  exec ${CC_REAL} \"\$@\""
            echo "fi"
          } > /tmp/cc-wrap
          chmod +x /tmp/cc-wrap

          CC=/tmp/cc-wrap go build -o bin/ohmywhisper ./cmd/

      - name: Package
        run: zip ohmywhisper_linux_${{ matrix.arch }}.zip bin/ohmywhisper

      - uses: actions/upload-artifact@v4
        with:
          name: ohmywhisper_linux_${{ matrix.arch }}
          path: ohmywhisper_linux_${{ matrix.arch }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: echo "version=$(tr -d '[:space:]' < whisper_version)" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.version }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            --title "ohmywhisper $TAG" \
            --notes "Built against [whisper.cpp $TAG](https://github.com/ggml-org/whisper.cpp/releases/tag/$TAG)" \
            artifacts/*.zip
